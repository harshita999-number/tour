{% extends "base_reset.html" %}

{% block content %}

<form method="post">
{% csrf_token %}

<div class="mb-3">
<input type="email" name="email" class="form-control" placeholder="Enter Email">
</div>

<button class="btn btn-primary w-100">Send Reset Link</button>

</form>

{% endblock %}

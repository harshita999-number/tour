<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Payment</title>
    <style>
        .welcome-alert {
            position: fixed;
            background-color: #f8d7da;
            top: 0;
            left: 0;
            width: 100%;
            color: #842029;
            padding: 12px 18px;
            border: 1px solid #f5c2c7;
            border-radius: 6px;
            font-size: 15px;
            text-align: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease-in-out;
        }

        @keyframes fadeIn { 
            from {
                opacity: 0;
                transform: translateY(-10px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }
    </style>
    <script src="https://kit.fontawesome.com/f7521c047c.js" crossorigin="anonymous"></script>
</head>
<body> 

{% if messages %}
    {% for message in messages %} 
       <div id="welcome-message" class="welcome-alert">
           {{ message }}
       </div>
    {% endfor %}  
{% endif %}

<script>
setTimeout(function() {
    var msg = document.getElementById("welcome-message");
    if (msg) {
        msg.style.opacity = "0";
        setTimeout(function(){
            msg.style.display = "none";
        }, 1000);
    }
}, 3000);
</script>

<h2 style="color: #003087; margin-left: 250px; margin-top: 0px;">Complete Your <span style="color: #009CDE">Payment</span></h2>

<h3 style="color: #003087;"> Please Choose a Payment Method To Complete <span style="color: #009CDE;">Your Hotel Booking <i class="fa-solid fa-wallet"></i></span></h3>

<div id="paypal-button-container"></div>

<script src="https://www.paypal.com/sdk/js?client-id={{ paypal_client_id }}&currency=USD"></script>

<script>
paypal.Buttons({

    createOrder: function(data, actions) {
        return fetch("/create_order", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            }
        })
        .then(response => response.json())
        .then(data => {
            if(!data.orderID){
                alert("Booking data missing session expired. Please login and try again.");
                throw new Error("no orderID");
                window.location.href = "/login";
            }
            else{
                return data.orderID;
            }
        });    
    },

    onApprove: function(data, actions) {
        return fetch("/capture_order", {
            method: "post",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                orderID: data.orderID
            })
        })
        .then(response => response.json())
        .then(data => {          
                alert("Payment Successful✅");
                setTimeout(function(){   
                    window.location.href = "/history";
                }, 2500);
        });
    },

    onCancel: function (data) {
        alert("Payment Cancelled ❌");
        setTimeout(function(){    
            window.location.href = "/index3";
        }, 2000);
    },

    onError: function (err) {
        console.log("PayPal Error:", err);
        alert("Payment Failed ❌");
        setTimeout(function(){    
            window.location.href = "/payment_page";
        }, 2000);
    }

}).render('#paypal-button-container');
</script>
<p style="color: #003087;">Trusted and Secure <span style="color: #009CDE">Payment Gateway <i class="fa-solid fa-lock"></i></span></p>
<p style="color: #003087;">Need Help? Contact Support: <span style="color: #009CDE;">support@travelling.com <i class="fa-solid fa-envelope"></i></span></p>
<p style="color: #003087;">Back To Home Page<a href="/index3" style="color: #009CDE;"> click here <i class="fa-solid fa-rotate-left"></i></a></p>
</body>
</html>

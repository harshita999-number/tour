{% extends 'base_reset.html' %}
{% load static %}

{% block content %}
<h2 class="text-center mb-3">My Profile</h2>

<div class="profile-circle mb-4">
    {{ user.username|first|upper }}
</div>

<style>
.profile-circle {
    width: 100px;
    height: 100px;
    background-color: #0d6efd;
    color: white;
    font-size: 48px;
    font-weight: bold;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
</style>

<!-- Message -->
{% if message %}
<div class="alert alert-{{ message_class }} alert-dismissible fade show mt-3" role="alert">
    {{ message }}
    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
</div>
{% endif %}

<form id="profileForm" method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" readonly>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" readonly>
    </div>

    <button type="button" id="editBtn" class="btn btn-primary"><i class="fa-solid fa-user-edit"></i> Edit</button>
    <button type="submit" id="saveBtn" class="btn btn-success d-none">Save</button>
    <a href="{% url 'index3' %}" class="btn btn-secondary ms-2">Home</a>
</form>

<!-- JS for edit toggle + validation -->
<script>
const editBtn = document.getElementById('editBtn');
const saveBtn = document.getElementById('saveBtn');
const usernameField = document.getElementById('username');
const emailField = document.getElementById('email');

editBtn.addEventListener('click', () => {
    usernameField.removeAttribute('readonly');
    emailField.removeAttribute('readonly');
    usernameField.focus();
    editBtn.classList.add('d-none');
    saveBtn.classList.remove('d-none');
});

document.getElementById('profileForm').addEventListener('submit', function(e) {
    let username = usernameField.value.trim();
    let email = emailField.value.trim();
    let emailPattern = /^[A-Za-z_]{2,}[0-9]{2,}@[A-Za-z]{3,}[.]{1}[A-Za-z.]{2,6}$/;
    let usernamePattern = /^[A-Za-z. ]{5,30}$/;

    if(username === "" || email === "") {
        alert("Fields cannot be empty!");
        e.preventDefault();
        return false;
    }

    if(!usernamePattern.test(username)) {
        alert("Enter a valid username");
        e.preventDefault();
        return false;
    }

    if(!emailPattern.test(email)) {
        alert("Enter a valid email!");
        e.preventDefault();
        return false;
    }
});
</script>

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
{% endblock %}
